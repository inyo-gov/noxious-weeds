project:
  type: website
  output-dir: docs
  # Survey nav downloads are copied flat into docs/exports/ by the report chunk
  # (export_survey_nav.R → exports/survey_nav_2026/ → docs/exports/).

website:
  title: "LORP Pepperweed Occupancy"
  site-url: https://inyo-gov.github.io/noxious-weeds
  navbar:
    left:
      - href: index.html
        text: Data report
      - icon: github
        href: https://github.com/inyo-gov/noxious-weeds
        text: GitHub
        aria-label: "GitHub repository (inyo-gov/noxious-weeds)"
    search: true

format:
  html:
    theme: litera
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "Contents"
    code-fold: true
    code-tools: true
    fig-responsive: true
    css: styles.css
    fig-dir: figure-html
    footer: "© 2026 Inyo County Water Department · Technical data report"
